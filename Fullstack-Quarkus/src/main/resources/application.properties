# Applikationsnamn
quarkus.application.name=FullstackLab1-Quarkus

# Databasinställningar (om du använder MySQL)
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=root
quarkus.datasource.password=root
quarkus.datasource.jdbc.url=jdbc:mysql://fullstack-db:3306/hospital
quarkus.datasource.jdbc.driver=com.mysql.cj.jdbc.Driver

# REST-klientkonfiguration för PatientService
mp.rest.client.se.kth.search.PatientService/mp-rest/url=https://hapi-fhir.app.cloud.cbh.kth.se/fhir
mp.rest.client.se.kth.search.PatientService/mp-rest/connectTimeout=2000
mp.rest.client.se.kth.search.PatientService/mp-rest/readTimeout=2000

quarkus.rest-client."se.kth.FhirClient".url=https://hapi-fhir.app.cloud.cbh.kth.se/fhir


# CORS-inställningar (om du behöver tillåta CORS)
quarkus.http.cors=true
quarkus.http.cors.origins=https://fullstack-frontend.app.cloud.cbh.kth.se
quarkus.http.cors.methods=GET, POST, PUT, DELETE, OPTIONS
quarkus.http.cors.headers=Content-Type, Authorization

# Hibernate ORM konfiguration (databasinställningar för MySQL)
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.dialect=org.hibernate.dialect.MySQL8Dialect

# application.properties
#patient-api/mp-rest/url=http://localhost:8088

# Produktion
#quarkus.profile=prod

# HTTP-host och port

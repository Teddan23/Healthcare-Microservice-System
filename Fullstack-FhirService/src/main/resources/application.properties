spring.application.name=Fullstack-FhirService

spring.datasource.url=jdbc:mysql://fullstack-db:3306/hospital
spring.datasource.username=root
spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.kafka.bootstrap-servers=fullstack-kafkaserver:9092
spring.kafka.consumer.group-id=patient-consumer-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
kafka.topic.register-user=patient-topic

